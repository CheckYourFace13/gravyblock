name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd /home/deploy/gravyblock
            git pull origin main
            npm install --production=false

            # Run DB migrations (idempotent — safe on every deploy)
            npx drizzle-kit push --config=drizzle.config.ts || echo "Migration warning (non-fatal)"

            # Create Stripe annual prices if they don't exist yet (idempotent)
            node scripts/setup-annual-prices.mjs || echo "Annual price setup warning (non-fatal)"

            npm run build
            pm2 restart gravyblock gravyblock-worker
            pm2 save
            echo "Deploy complete at $(date)"
