name: Deploy to VPS

# Manual-trigger only. The VPS firewall blocks inbound SSH from GitHub's
# runners, so push-deploys always fail. Deployment now happens via the
# self-deploy cron on the VPS (scripts/self-deploy.sh, polls every 2 min).
# This workflow is kept for manual use if the firewall is ever opened.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd /home/deploy/gravyblock
            # VPS is a deploy mirror — force-sync to origin/main so local drift
            # (e.g. npm rewriting package-lock.json) can never block a deploy.
            # reset --hard does not touch untracked files like .env.
            git fetch origin main
            git reset --hard origin/main
            npm install --production=false

            # Run DB migrations — pipe yes to auto-accept any prompts (idempotent)
            echo "y" | npx drizzle-kit push --config=drizzle.config.ts 2>&1 || echo "Migration warning (non-fatal)"

            # Create Stripe annual prices if they don't exist yet (idempotent)
            node scripts/setup-annual-prices.mjs 2>&1 || echo "Annual price setup warning (non-fatal)"

            npm run build
            pm2 startOrRestart ecosystem.config.js --update-env
            pm2 save
            echo "Deploy complete at $(date)"
